name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build plain wasm + verify host-only imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # packr 0.11.0 plain build: the two link-args come from .cargo/config.toml
      # (--export-memory, --no-entry). The resulting frontdoor.wasm is directly
      # loadable — no compose step, no binaryen.
      - name: cargo build --release (plain cdylib)
        run: |
          set -euo pipefail
          echo "::group::cargo build"
          nix develop --command cargo build --target wasm32-unknown-unknown --release
          echo "::endgroup::"

      # Verify the plain wasm is self-contained: it validates and every import is
      # a host theater:simple/* func (no env.memory / pack:alloc / __linear_memory
      # — those would mean the recipe was not applied).
      - name: Assert host-only imports
        run: |
          set -euo pipefail
          W="target/wasm32-unknown-unknown/release/frontdoor.wasm"
          test -f "$W" || { echo "::error::wasm not emitted: $W"; exit 1; }
          nix develop --command wasm-tools validate "$W"
          bad=$(nix develop --command bash -c "wasm-tools print '$W' | grep -E '^[[:space:]]*\\(import ' | grep -v 'theater:simple/' || true")
          if [ -n "$bad" ]; then
            echo "::error::frontdoor.wasm has non-host imports (recipe not applied):"
            echo "$bad"
            exit 1
          fi
          echo "frontdoor.wasm host-only imports OK: $W ($(stat -c%s "$W") bytes)"
