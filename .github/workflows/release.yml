name: Release

on:
  # Tag-driven release. Push a `release-*` tag (locally or via
  # workflow_dispatch) to cut a versioned plain wasm + sentinel-renderable
  # manifest.
  push:
    tags: ['release-*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Build plain wasm + tag + upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # packr 0.11.0 plain build (two link-args from .cargo/config.toml).
      # Emits target/wasm32-unknown-unknown/release/frontdoor.wasm — directly
      # loadable, no compose step.
      - name: cargo build --release (plain cdylib)
        run: |
          set -euo pipefail
          echo "::group::cargo build"
          nix develop --command cargo build --target wasm32-unknown-unknown --release
          echo "::endgroup::"

      - name: Assert host-only imports
        run: |
          set -euo pipefail
          W="target/wasm32-unknown-unknown/release/frontdoor.wasm"
          test -f "$W" || { echo "::error::wasm not emitted: $W"; exit 1; }
          nix develop --command wasm-tools validate "$W"
          bad=$(nix develop --command bash -c "wasm-tools print '$W' | grep -E '^[[:space:]]*\\(import ' | grep -v 'theater:simple/' || true")
          if [ -n "$bad" ]; then
            echo "::error::frontdoor.wasm has non-host imports (recipe not applied):"
            echo "$bad"
            exit 1
          fi
          echo "frontdoor.wasm host-only imports OK: $W ($(stat -c%s "$W") bytes)"

      - name: Create GitHub release and upload artifacts
        run: |
          set -euo pipefail
          if [ -n "$GITHUB_REF_NAME" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            DATE=$(date +%Y%m%d)
            SHA=$(git rev-parse --short=7 HEAD)
            TAG="release-$DATE-$SHA"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --generate-notes

          STAGE_TAG="${TAG#release-}"
          REPO="${{ github.repository }}"

          # Deploy artifact = the plain, directly-loadable wasm (packr 0.11.0 —
          # no composite). Stage-tagged for a stable URL.
          WASM_FILE="frontdoor-${STAGE_TAG}.wasm"
          cp "target/wasm32-unknown-unknown/release/frontdoor.wasm" "${WASM_FILE}"
          chmod +w "${WASM_FILE}"

          WASM_URL="https://github.com/${REPO}/releases/download/${TAG}/${WASM_FILE}"

          # Direct-spawn manifest. Self-referencing `package` URL +
          # no `initial_state`. Use this with `theater spawn` from a
          # local checkout for smoke testing.
          MANIFEST_FILE="frontdoor-${STAGE_TAG}.toml"
          cat > "${MANIFEST_FILE}" <<TOML
          name = "frontdoor"
          version = "0.1.0"
          package = "${WASM_URL}"

          [[handler]]
          type = "runtime"

          [[handler]]
          type = "tcp"

          [[handler]]
          type = "supervisor"
          TOML

          # Sentinel-renderable variant: __PACKAGE__ + __FRONTDOOR_CFG__
          # placeholders for sentinel's substitution path. Sentinel pins
          # the wasm via `children.frontdoor.default_package` and renders
          # `initial_state` from `secrets.FRONTDOOR_CFG`. Kept in sync
          # with sentinel/frontdoor.template.toml at HEAD by copying it
          # into the release verbatim.
          SENTINEL_TEMPLATE_FILE="frontdoor-${STAGE_TAG}.sentinel.toml"
          cp sentinel/frontdoor.template.toml "${SENTINEL_TEMPLATE_FILE}"
          chmod +w "${SENTINEL_TEMPLATE_FILE}"

          gh release upload "$TAG" "${WASM_FILE}" "${MANIFEST_FILE}" "${SENTINEL_TEMPLATE_FILE}"

          echo "Released $TAG:"
          echo "  wasm:     ${WASM_FILE}"
          echo "  manifest: ${MANIFEST_FILE}"
          echo "  sentinel: ${SENTINEL_TEMPLATE_FILE}"
        env:
          GH_TOKEN: ${{ github.token }}
