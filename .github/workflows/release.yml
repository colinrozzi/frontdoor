name: Release

on:
  # Tag-driven release. Push a `release-*` tag (locally or via
  # workflow_dispatch) to cut a versioned self-contained composite +
  # sentinel-renderable manifest.
  push:
    tags: ['release-*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Build composite + tag + upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # packr 0.10.2 self-contained composite (compose + verify-in-build).
      # Emits target/wasm32-unknown-unknown/release/frontdoor.composite.wasm.
      - name: theater build --release (compose + verify-in-build)
        run: |
          set -euo pipefail
          echo "::group::theater build ."
          nix develop --command theater build --release .
          echo "::endgroup::"

      - name: Assert composite is self-contained (host-only imports)
        run: |
          set -euo pipefail
          C="target/wasm32-unknown-unknown/release/frontdoor.composite.wasm"
          test -f "$C" || { echo "::error::composite not emitted: $C"; exit 1; }
          nix develop --command wasm-tools validate "$C"
          bad=$(nix develop --command bash -c "wasm-tools print '$C' | grep -E '^[[:space:]]*\\(import ' | grep -v 'theater:simple/' || true")
          if [ -n "$bad" ]; then
            echo "::error::frontdoor composite has non-host imports (not self-contained):"
            echo "$bad"
            exit 1
          fi
          echo "frontdoor composite self-contained: $C ($(stat -c%s "$C") bytes)"

      - name: Create GitHub release and upload artifacts
        run: |
          set -euo pipefail
          if [ -n "$GITHUB_REF_NAME" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            DATE=$(date +%Y%m%d)
            SHA=$(git rev-parse --short=7 HEAD)
            TAG="release-$DATE-$SHA"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --generate-notes

          STAGE_TAG="${TAG#release-}"
          REPO="${{ github.repository }}"

          # Deploy artifact = the self-contained COMPOSITE (a bare member is
          # rejected by the 0.10.x loader). Stage-tagged for a stable URL.
          COMPOSITE_FILE="frontdoor-${STAGE_TAG}.composite.wasm"
          cp "target/wasm32-unknown-unknown/release/frontdoor.composite.wasm" "${COMPOSITE_FILE}"
          chmod +w "${COMPOSITE_FILE}"

          COMPOSITE_URL="https://github.com/${REPO}/releases/download/${TAG}/${COMPOSITE_FILE}"

          # Direct-spawn manifest. Self-referencing `package` URL +
          # no `initial_state`. Use this with `theater spawn` from a
          # local checkout for smoke testing.
          MANIFEST_FILE="frontdoor-${STAGE_TAG}.toml"
          cat > "${MANIFEST_FILE}" <<TOML
          name = "frontdoor"
          version = "0.1.0"
          package = "${COMPOSITE_URL}"

          [[handler]]
          type = "runtime"

          [[handler]]
          type = "tcp"

          [[handler]]
          type = "supervisor"
          TOML

          # Sentinel-renderable variant: __PACKAGE__ + __FRONTDOOR_CFG__
          # placeholders for sentinel's substitution path. Sentinel pins
          # the composite via `children.frontdoor.default_package` and renders
          # `initial_state` from `secrets.FRONTDOOR_CFG`. Kept in sync
          # with sentinel/frontdoor.template.toml at HEAD by copying it
          # into the release verbatim.
          SENTINEL_TEMPLATE_FILE="frontdoor-${STAGE_TAG}.sentinel.toml"
          cp sentinel/frontdoor.template.toml "${SENTINEL_TEMPLATE_FILE}"
          chmod +w "${SENTINEL_TEMPLATE_FILE}"

          gh release upload "$TAG" "${COMPOSITE_FILE}" "${MANIFEST_FILE}" "${SENTINEL_TEMPLATE_FILE}"

          echo "Released $TAG:"
          echo "  composite: ${COMPOSITE_FILE}"
          echo "  manifest:  ${MANIFEST_FILE}"
          echo "  sentinel:  ${SENTINEL_TEMPLATE_FILE}"
        env:
          GH_TOKEN: ${{ github.token }}
