name: Release

on:
  # Tag-driven release. Push a `release-*` tag (locally or via
  # workflow_dispatch) to cut a versioned wasm + sentinel-renderable
  # manifest.
  push:
    tags: ['release-*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Build + tag + upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build wasm
        run: nix build

      - name: Create GitHub release and upload artifacts
        run: |
          if [ -n "$GITHUB_REF_NAME" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            DATE=$(date +%Y%m%d)
            SHA=$(git rev-parse --short=7 HEAD)
            TAG="release-$DATE-$SHA"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --generate-notes

          STAGE_TAG="${TAG#release-}"
          REPO="${{ github.repository }}"

          WASM_FILE="frontdoor-${STAGE_TAG}.wasm"
          cp "$(realpath result)/frontdoor.wasm" "${WASM_FILE}"
          chmod +w "${WASM_FILE}"

          # Sentinel-renderable manifest with a self-referencing
          # package URL. Initial state + routing table are stamped in
          # at deploy time by sentinel; this template just wires the
          # handler stanzas.
          MANIFEST_FILE="frontdoor-${STAGE_TAG}.toml"
          WASM_URL="https://github.com/${REPO}/releases/download/${TAG}/${WASM_FILE}"
          cat > "${MANIFEST_FILE}" <<TOML
          name = "frontdoor"
          version = "0.1.0"
          package = "${WASM_URL}"

          [[handler]]
          type = "runtime"

          [[handler]]
          type = "tcp"

          [[handler]]
          type = "supervisor"
          TOML

          gh release upload "$TAG" "${WASM_FILE}" "${MANIFEST_FILE}"
        env:
          GH_TOKEN: ${{ github.token }}
