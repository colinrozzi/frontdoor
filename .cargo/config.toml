[target.wasm32-unknown-unknown]
# Fixed-base self-contained member (packr 0.10.2). Replaces the retired PIC
# flags entirely (no relocation-model=pic / --experimental-pic / -shared /
# --export=__wasm_call_ctors). `theater build` links this member + the packr
# bundled allocator into an own-memory frontdoor.composite.wasm via packr::link
# (wasm-merge). --global-base=0x50000 (327680) is the first package slot for a
# SINGLE-package actor (frontdoor is one crate — no [[link]] edges).
# --no-merge-data-segments keeps the CGRF __pack_types metadata as its own
# segment so packr's read_surface can find it. See theater
# docs/self-contained-actor-recipe.md §2.
rustflags = [
    "-C", "link-arg=--import-memory",
    "-C", "link-arg=--initial-memory=8388608",
    "-C", "link-arg=--stack-first",
    "-C", "link-arg=-zstack-size=262144",
    "-C", "link-arg=--global-base=327680",
    "-C", "link-arg=--no-entry",
    "-C", "link-arg=--no-merge-data-segments",
]
