[target.wasm32-unknown-unknown]
# packr 0.11.0 plain-build model (composition/fuse retired). The actor is a
# plain cdylib: `packr-guest`'s setup_guest!() links dlmalloc in and the wasm
# exports its own GROWABLE memory + __pack_alloc/__pack_free + lifecycle,
# importing only host theater:simple/*. No fixed base, no --import-memory, no
# compose step. Just: export the memory + no CRT entry point. See theater
# docs/self-contained-actor-recipe.md (top block).
rustflags = [
    "-C", "link-arg=--export-memory",
    "-C", "link-arg=--no-entry",
]
